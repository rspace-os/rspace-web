# Root manifest manages git hooks and frontend dependencies/scripts.
packages: []

overrides:
  react-is: ^18.3.1
  # Pin rolldown to 1.0.1 (bundled in Vite 8.0.13) to avoid
  # https://github.com/rolldown/rolldown/issues/9502 and
  # https://github.com/vitejs/vite/issues/22499, where rolldown 1.0.2+
  # generates pre-bundled chunks that call init_*() helpers without importing
  # them, crashing the dev server with "init_emotion_react_... is not defined".
  # The Ketcher circular-chunk crash that 1.0.1 reintroduces is worked around
  # in vite.config.ts via output.codeSplitting (see comment there).
  # Remove this override once a rolldown release resolves #9502.
  rolldown: 1.0.1

allowBuilds:
  lefthook: true
  '@swc/core': true
  canvas: true
  core-js: true
  esbuild: true
  # msw's postinstall only prints a funding notice; allow it so frozen
  # installs don't fail with ERR_PNPM_IGNORED_BUILDS.
  msw: true
  protobufjs: true
  vue-demi: true

# Block packages published less than 7 days ago (10080 minutes) as a defence
# against supply-chain attacks that are typically caught within that window.
# Stricter than pnpm 11's 1440-minute (1 day) default.
minimumReleaseAge: 10080
strictPeerDependencies: true

peerDependencyRules:
  allowedVersions:
    # Ketcher 3.12.0 brings draft-js@0.11.7 via ketcher-react, while its
    # draft-js-custom-styles dependency declares draft-js@0.10.x.
    'draft-js-custom-styles>draft-js': 0.11.7
    # This comes from `@playwright/experimental-ct`
    '@vitejs/plugin-react>vite': 8.0.16
    # @sa11y/vitest pulls an older vitest, which wants the matching UI package.
    'vitest>@vitest/ui': 4.1.6
    # @scalar/api-reference-react pulls neverpanic, which peer-declares
    # typescript@5 but works with the repo's typescript@6.0.3.
    'neverpanic>typescript': 6.0.3
