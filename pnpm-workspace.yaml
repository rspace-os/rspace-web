# Root manifest manages git hooks and frontend dependencies/scripts.
packages: []

overrides:
  # ketcher-react and ketcher-standalone declare ketcher-core@3.12 as a peer dep
  # but work with 3.15.0; the override pins a single version to avoid a tsc
  # type mismatch from the two-instance `#private` clash.
  ketcher-core: 3.15.0
  # Force miew-react 0.12.0 (ketcher-react pulls 0.11.0 transitively). 0.12.0
  # declares a react/react-dom peer of >=18.2.0, so it supports React 19 without
  # the allowedVersions workaround that 0.11.0 (peer ^18.2.0) needed.
  miew-react: 0.12.0
  # miew-react@0.12.0 was published with a broken "miew": "workspace:^"
  # dependency (the workspace protocol only resolves inside miew's own
  # monorepo). Redirect it to the published miew 0.12.0 on npm.
  miew-react>miew: 0.12.0

allowBuilds:
  lefthook: true
  '@swc/core': true
  canvas: true
  core-js: true
  # core-js-pure ships the same postinstall funding banner as core-js, just
  # under a separate package name; pulled in transitively by @mui/x-chat.
  core-js-pure: true
  esbuild: true
  # msw's postinstall only prints a funding notice; allow it so frozen
  # installs don't fail with ERR_PNPM_IGNORED_BUILDS.
  msw: true
  protobufjs: true
  vue-demi: true

# Block packages published less than 7 days ago (10080 minutes) as a defence
# against supply-chain attacks that are typically caught within that window.
# Stricter than pnpm 11's 1440-minute (1 day) default.
minimumReleaseAge: 10080
strictPeerDependencies: true

peerDependencyRules:
  allowedVersions:
    # @sa11y/vitest pulls an older vitest, which wants the matching UI+browser packages.
    'vitest>@vitest/ui': 4.1.9
    'vitest>@vitest/browser': 4.1.9
