# Root manifest manages git hooks and frontend dependencies/scripts.
packages: []

overrides:
  # Pin the MUI core packages to 9.0.x. 9.1.x ships an ESM build whose
  # @mui/material/internal/Transition.mjs does a bare directory import of
  # `react-transition-group/TransitionGroupContext`, which Node's native ESM
  # resolver rejects with ERR_UNSUPPORTED_DIR_IMPORT under Vitest, failing the
  # whole frontend test suite. See
  # https://github.com/mui/material-ui/issues/48644.
  # MUI X (@mui/x-*) is intentionally left on its newer versions.
  # Remove these pins once the upstream issue is resolved.
  '@mui/material': 9.0.1
  '@mui/icons-material': 9.0.1
  '@mui/system': 9.0.1
  '@mui/styled-engine': 9.0.0
  # ketcher-react and ketcher-standalone declare ketcher-core@3.12 as a peer dep
  # but work with 3.15.0; the override pins a single version to avoid a tsc
  # type mismatch from the two-instance `#private` clash.
  ketcher-core: 3.15.0
  # Force miew-react 0.12.0 (ketcher-react pulls 0.11.0 transitively). 0.12.0
  # declares a react/react-dom peer of >=18.2.0, so it supports React 19 without
  # the allowedVersions workaround that 0.11.0 (peer ^18.2.0) needed.
  miew-react: 0.12.0
  # miew-react@0.12.0 was published with a broken "miew": "workspace:^"
  # dependency (the workspace protocol only resolves inside miew's own
  # monorepo). Redirect it to the published miew 0.12.0 on npm.
  miew-react>miew: 0.12.0
  # Pin rolldown to 1.0.1 (bundled in Vite 8.0.13) to avoid
  # https://github.com/rolldown/rolldown/issues/9502 and
  # https://github.com/vitejs/vite/issues/22499, where rolldown 1.0.2+
  # generates pre-bundled chunks that call init_*() helpers without importing
  # them, crashing the dev server with "init_emotion_react_... is not defined".
  # The Ketcher circular-chunk crash that 1.0.1 reintroduces is worked around
  # in vite.config.ts via output.codeSplitting (see comment there).
  # Remove this override once a rolldown release resolves #9502.
  rolldown: 1.0.1

allowBuilds:
  lefthook: true
  '@swc/core': true
  canvas: true
  core-js: true
  esbuild: true
  # msw's postinstall only prints a funding notice; allow it so frozen
  # installs don't fail with ERR_PNPM_IGNORED_BUILDS.
  msw: true
  protobufjs: true
  vue-demi: true

# Block packages published less than 7 days ago (10080 minutes) as a defence
# against supply-chain attacks that are typically caught within that window.
# Stricter than pnpm 11's 1440-minute (1 day) default.
minimumReleaseAge: 10080
strictPeerDependencies: true

peerDependencyRules:
  allowedVersions:
    # Ketcher 3.12.0 brings draft-js@0.11.7 via ketcher-react, while its
    # draft-js-custom-styles dependency declares draft-js@0.10.x.
    'draft-js-custom-styles>draft-js': 0.11.7
    # @sa11y/vitest pulls an older vitest, which wants the matching UI+browser packages.
    'vitest>@vitest/ui': 4.1.9
    'vitest>@vitest/browser': 4.1.9
    # @scalar/api-reference-react pulls neverpanic, which peer-declares
    # typescript@5 but works with the repo's typescript@6.0.3.
    'neverpanic>typescript': 6.0.3
