# Git hooks managed by lefthook (https://lefthook.dev). Enable once per clone by
# running `pnpm install` in the repo root. tsc/biome/i18n run project-wide, not
# per-file; spotless is scoped to staged Java files via -DspotlessFiles (path
# regex, guarded against an empty list so it never falls back to matching
# everything).
colors: false

pre-commit:
  parallel: true
  commands:
    spotless:
      glob: "**/*.java"
      run: |
        spotless_files=$(printf '%s\n' {staged_files} \
          | sed '/^$/d; s/[.[\](){}+^$|\\]/\\&/g; s#^#.*#' \
          | paste -sd, -)
        if [ -n "$spotless_files" ]; then
          ./mvnw -q spotless:check -DspotlessFiles="$spotless_files"
        fi
    tsc:
      glob: "src/main/webapp/ui/**/*.{ts,tsx}"
      run: pnpm run tsc
    biome:
      glob: "src/main/webapp/ui/**/*.{ts,tsx,css}"
      run: pnpm run lint:ci --colors=off
    i18n:
      glob: "src/main/webapp/ui/src/**/*.{ts,tsx,json}"
      run: pnpm run i18n:check && pnpm run i18n:lint
