# Git hooks managed by lefthook (https://lefthook.dev).
# Enable once per clone by running `pnpm install` in the repo root.
pre-commit:
  parallel: true
  commands:
    # Fail the commit if any staged Java file is not spotless-formatted.
    # spotlessFiles matches the absolute path via String#matches, so each
    # staged (repo-relative) path is prefixed with `.*` to anchor correctly.
    # Guard against an empty list (drop blank lines) so we never fall back to
    # `-DspotlessFiles=".*"`, which would match every file in the repo.
    spotless:
      glob: "*.java"
      run: |
        spotless_files=$(printf '%s\n' {staged_files} \
          | sed '/^$/d; s#^#.*#' \
          | paste -sd, -)
        if [ -n "$spotless_files" ]; then
          ./mvnw -q spotless:check -DspotlessFiles="$spotless_files"
        fi
    # Run staged Vitest files directly instead of the whole frontend suite.
    vitest:
      glob: "src/main/webapp/ui/**/*.{test,spec}.{ts,tsx,js,jsx}"
      run: |
        test_files=$(printf '%s\n' {staged_files} \
          | sed 's#^src/main/webapp/ui/##' \
          | paste -sd' ' -)
        if [ -n "$test_files" ]; then
          cd src/main/webapp/ui
          ../../../../node_modules/.bin/vitest run --passWithNoTests $test_files
        fi
    # Run staged Java unit test classes directly instead of the whole Maven suite.
    java-tests:
      glob: "*Test.java"
      run: |
        test_classes=$(printf '%s\n' {staged_files} \
          | awk '/^src\/test\/java\/.*Test\.java$/ { sub(/^src\/test\/java\//, ""); sub(/\.java$/, ""); gsub(/\//, "."); print }' \
          | paste -sd, -)
        if [ -n "$test_classes" ]; then
          ./mvnw -q test -Dtest="$test_classes"
        fi
