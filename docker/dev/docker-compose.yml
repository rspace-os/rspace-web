# Per-worktree RSpace development stack.
#
# This file is not meant to be run with a bare `docker compose up`; use the
# ./rspace-dev launcher, which derives a per-worktree project name and a set of
# free host ports, writes them to docker/dev/.env, and then calls compose with
# the right context. See README.md.
#
# All of the ${...} values below come from docker/dev/.env (generated by the
# launcher) with the safe fallbacks shown here.

name: ${COMPOSE_PROJECT_NAME:-rspace-dev}

services:
  # ---------------------------------------------------------------------------
  # MariaDB. Mirrors the production rspace-docker DB config (utf8mb4 + strict
  # sql-mode) so local behaviour matches deployments.
  # ---------------------------------------------------------------------------
  db:
    image: ${DB_IMAGE:-mariadb:lts-jammy}
    container_name: ${COMPOSE_PROJECT_NAME:-rspace-dev}-db
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rspacedbpwd}
      MARIADB_DATABASE: rspace
      MARIADB_USER: ${DB_USER:-rspacedbuser}
      MARIADB_PASSWORD: ${DB_PASSWORD:-rspacedbpwd}
    volumes:
      - db-data:/var/lib/mysql
      - ./db/db-config.cnf:/etc/mysql/conf.d/rspace.cnf:ro
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Bound to loopback only so the DB is never exposed beyond this machine.
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Java backend: Maven + Temurin JDK 17 running `mvn jetty:run`. The worktree
  # source tree is bind-mounted at /rspace so edits on the host are live in the
  # container; build/output dirs are masked with named volumes so host (often
  # macOS/arm64) artifacts never mix with the Linux container's.
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9-eclipse-temurin-17}
    image: rspace-dev-app:local
    container_name: ${COMPOSE_PROJECT_NAME:-rspace-dev}-app
    depends_on:
      db:
        condition: service_healthy
      frontend:
        condition: service_started
    working_dir: /rspace
    environment:
      # keepdbintact | drop-recreate-db. The launcher sets drop-recreate-db on
      # first boot (and on `reset-db`) so the schema + sample data are created.
      RSPACE_DB_MODE: ${RSPACE_DB_MODE:-keepdbintact}
      RS_FILE_BASE: /var/rspace/filestore
      JDBC_URL: jdbc:mysql://db:3306/rspace
      JDBC_URL_MAVEN: jdbc:mysql://db:3306
      # The app shares the frontend's network namespace (see network_mode below),
      # so Vite is reachable at localhost — a host its dev-server host check
      # trusts by default, unlike the service name "frontend".
      VITE_ORIGIN: http://localhost:5173
      # Used for absolute links (emails/exports) so they match the host port.
      APP_PUBLIC_PORT: ${APP_PORT:-8080}
      # Session cookie name override. Cookies are scoped by host only (not
      # port), so each instance defaults to JSESSIONID_<APP_PUBLIC_PORT> (set in
      # the entrypoint) to keep concurrent worktree logins from evicting each
      # other. Set this in .env only if you need a fixed name.
      RSPACE_SESSION_COOKIE_NAME: ${RSPACE_SESSION_COOKIE_NAME:-}
      MAVEN_OPTS: ${MAVEN_OPTS:--Xmx2g}
      # Remote JVM debugging (JDWP) for IntelliJ etc. Listens on 5005 in the
      # container (published on the frontend service, since the app shares its
      # network namespace). Set RSPACE_DEBUG=false to disable, or
      # RSPACE_DEBUG_SUSPEND=y to pause startup until a debugger attaches.
      RSPACE_DEBUG: ${RSPACE_DEBUG:-true}
      RSPACE_DEBUG_SUSPEND: ${RSPACE_DEBUG_SUSPEND:-n}
      # Enhanced class redefinition (JBR DCEVM + HotswapAgent), on by default, so
      # the IDE's hot code replace can redefine changed classes live (README
      # "Hot reloading Java"). Set to false to run plain (no agent).
      RSPACE_HOTSWAP: ${RSPACE_HOTSWAP:-true}
    volumes:
      - ${RSPACE_SRC:?run via ./rspace-dev}:/rspace:cached
      - m2-repo:/root/.m2
      - app-target:/rspace/target
      # Search indices live in volumes OUTSIDE the bind mount. The entrypoint
      # points Hibernate Search / Lucene at these paths, because under jetty:run
      # the default index base is unset and Lucene would otherwise scatter
      # per-entity index dirs into the worktree root.
      - search-index:/var/rspace/search/hibernate
      - lucene-index:/var/rspace/search/lucene
      - filestore:/var/rspace/filestore
    # Share the frontend's network namespace so the backend reaches Vite at
    # localhost:5173 (a host Vite trusts) instead of the service name "frontend"
    # (which Vite's host check rejects). The app is the dependent here because it
    # restarts often, so `restart` / `reload` / `reset-db` do not disrupt the
    # shared network. Published host ports therefore live on the frontend service.
    network_mode: "service:frontend"
    # stdin/tty kept open so Jetty's manual-redeploy console reader has a stable
    # stdin; the entrypoint feeds it from a FIFO for `rspace-dev reload`.
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend: Vite dev server. Runs `pnpm run serve` from the repo root, where
  # all frontend dependencies are declared, and binds 0.0.0.0 inside the
  # container. The app shares THIS service's network namespace (see the app
  # service's network_mode), so the backend reaches Vite over localhost and this
  # service publishes both the app's and Vite's host ports.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24-bookworm-slim}
    image: rspace-dev-frontend:local
    container_name: ${COMPOSE_PROJECT_NAME:-rspace-dev}-frontend
    working_dir: /rspace
    environment:
      VITE_DEV_SERVER_HOST: 0.0.0.0
      VITE_DEV_SERVER_PORT: "5173"
      # HMR: the browser binds to the published host port, not the in-container
      # bind address. VITE_HMR_HOST is the browser-reachable host (localhost),
      # VITE_HMR_CLIENT_PORT is the published Vite port, and polling makes file
      # watching work over the bind mount (native fs events are not delivered).
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_CLIENT_PORT: ${VITE_PORT:-5173}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-true}
      # Shared, content-addressed pnpm store (mounted volume) to avoid
      # re-downloading packages across worktrees.
      npm_config_store_dir: /pnpm-store
    volumes:
      - ${RSPACE_SRC:?run via ./rspace-dev}:/rspace:cached
      - node-modules:/rspace/node_modules
      - pnpm-store:/pnpm-store
    # The app shares this service's network namespace, so the app's (8080), Vite's
    # (5173), and the app's JDWP debug (5005) host ports are all published here.
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
      - "127.0.0.1:${VITE_PORT:-5173}:5173"
      - "127.0.0.1:${DEBUG_PORT:-5005}:5005"
    restart: unless-stopped

volumes:
  # Per-worktree (namespaced by the compose project name): isolated DB, build
  # outputs, indices, filestore, and node_modules.
  db-data:
  app-target:
  search-index:
  lucene-index:
  filestore:
  node-modules:
  # Shared across all worktrees (fixed names) to avoid re-downloading Maven
  # artifacts and npm packages for every worktree. Declared `external` so that
  # `rspace-dev nuke` (docker compose down -v) NEVER removes them — tearing down
  # one worktree must not wipe the cache the others rely on. The launcher creates
  # them on `up`.
  m2-repo:
    external: true
    name: rspace-dev-m2-repo
  pnpm-store:
    external: true
    name: rspace-dev-pnpm-store
