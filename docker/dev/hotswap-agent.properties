# HotswapAgent configuration for the RSpace dev container.
#
# The entrypoint copies this onto the webapp classpath (target/classes) so the
# agent picks it up for the application's class loader.

# autoHotswap (file-watch -> redefine) is OFF on purpose. Maven's incremental
# build does not work over the bind mount, so an in-container `mvn compile`
# rewrites ~all class files and would mass-redefine. The supported trigger is the
# IDE's hot code replace, which compiles the single changed class on your machine
# and redefines it over the debug connection (JDWP) — it does not touch the
# container filesystem, so it is unaffected by this setting.
autoHotswap=false

# Disabled plugins, and why (RSpace's legacy stack + Java 17):
#
# * Hibernate* — RSpace uses Spring-managed Hibernate 5; the Hibernate plugin
#   wraps the EntityManagerFactory in a way that breaks Spring's transaction
#   binding at startup (HotswapAgent issue #187: "no transaction is in progress"
#   when creating beans whose @PostConstruct writes).
# * Spring / SpringBoot — RSpace's context is large and heavily XML- and
#   AOP-driven (the *Manager transaction proxies). The Spring plugin's bean
#   *reload* throws inside SpringBeanReload and leaves the running context broken
#   when a managed class changes. We instead let JBR's enhanced class
#   redefinition swap the new bytecode into the EXISTING bean instances, which is
#   stable. Trade-off: new/changed bean *definitions* (new beans, changed wiring,
#   new @RequestMapping) are NOT picked up live and need a restart.
# * Proxy — its ProxyGenerator hits an IllegalAccessError on Java 17 (java.base
#   does not export sun.security.action). Not needed for redefining existing
#   classes.
#
# Nothing we rely on is lost: all of the above change types already required a
# restart (see README "What still requires a full restart").
disabledPlugins=Hibernate,HibernateJakarta,Hibernate3,Hibernate3JPA,Spring,SpringBoot,Proxy

# Keep agent logging quiet; raise to DEBUG/TRACE when diagnosing what reloaded.
LOGGER=INFO
