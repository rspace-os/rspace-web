<IfModule !headers_module>
    LoadModule headers_module modules/mod_headers.so
</IfModule>
<IfModule !proxy_module>
    LoadModule proxy_module modules/mod_proxy.so
</IfModule>
<IfModule !proxy_http_module>
    LoadModule proxy_http_module modules/mod_proxy_http.so
</IfModule>
<IfModule !rewrite_module>
    LoadModule rewrite_module modules/mod_rewrite.so
</IfModule>

ServerName localhost

ProxyRequests Off
ProxyPreserveHost On
RewriteEngine On

RewriteCond %{REQUEST_URI} ^/otlp/v1/(traces|metrics)$
RewriteCond %{REQUEST_METHOD} !^POST$
RewriteRule ^ - [R=405,L]

RewriteCond %{REQUEST_URI} ^/otlp/v1/(traces|metrics)$
RewriteCond %{HTTP:Content-Encoding} !^$ [OR]
RewriteCond %{HTTP:Content-Type} !^application/(x-protobuf|json)([[:space:]]*;|$) [NC]
RewriteRule ^ - [R=415,L]

<LocationMatch "^/otlp/v1/(traces|metrics)$">
    LimitRequestBody 5242880
    RequestHeader unset Authorization
    RequestHeader unset Cookie
    RequestHeader unset Proxy-Authorization
</LocationMatch>

ProxyPassMatch "^/otlp/v1/(traces|metrics)$" "http://otel-collector:4318/v1/$1" connectiontimeout=5 timeout=30
ProxyPass "/otlp/" "!"

ProxyPass "/" "http://frontend:8080/" connectiontimeout=5 timeout=60
ProxyPassReverse "/" "http://frontend:8080/"
