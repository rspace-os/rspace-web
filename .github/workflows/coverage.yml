name: Coverage

# Whole-codebase JaCoCo coverage, run on a nightly schedule (and on manual
# dispatch). Kept separate from lint-and-test.yml so the fast
# spring-tests/integration-tests split stays agent-free and there is no
# cross-shard report merge. `mvn verify -DenableTestCoverage` runs the test
# phase (unit + Spring) and the integration-test phase, producing both
# target/site/jacoco/jacoco.xml and target/site/jacoco-it/jacoco.xml, which
# Codecov merges server-side.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      java_vendor:
        description: 'Java vendor Maven toolchain'
        type: string
        default: 'temurin'

permissions:
  contents: read

env:
  RS_FILE_BASE: /tmp/${{ github.ref_name }}-filestore
  CI: "true"

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [17]
    services:
      db:
        image: mariadb:lts-jammy
        env:
          MARIADB_ROOT_PASSWORD: rspacedbpwd
          MARIADB_DATABASE: rspace
          MARIADB_USER: rspacedbuser
          MARIADB_PASSWORD: rspacedbpwd
        ports:
          - 3306:3306
        options: >-
          --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=2g
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=40
          --health-start-period=30s
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: ${{ inputs.java_vendor || 'temurin' }}
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Configure MariaDB
        run: |
          mysql -h127.0.0.1 -uroot -prspacedbpwd <<'SQL'
          SET GLOBAL character_set_server = 'utf8mb4';
          SET GLOBAL collation_server = 'utf8mb4_unicode_ci';
          SET GLOBAL sql_mode = 'STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION';
          GRANT CREATE, DROP ON *.* TO 'rspacedbuser'@'%';
          FLUSH PRIVILEGES;
          SQL

      - name: Setup filestore
        run: |
          rm -rf $RS_FILE_BASE
          mkdir -p $RS_FILE_BASE

      - name: Run full suite with coverage
        run: |
          ./mvnw clean verify -DenableTestCoverage -Denvironment=drop-recreate-db \
            -Djava-version=${{ matrix.java-version }} \
            -Djava-vendor=${{ inputs.java_vendor || 'temurin' }} \
            -Djavax.xml.accessExternalDTD=all \
            -Dlog4j2.configurationFile=log4j2-dev.xml \
            -Dsurefire.rerunFailingTestsCount=1 \
            -Djdbc.db.maven=rspace \
            -Djdbc.url=jdbc:mysql://localhost:3306/rspace \
            -Dmaven.test.failure.ignore=false \
            -DRS.devlogLevel=INFO \
            -DRS_FILE_BASE=${RS_FILE_BASE}

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7.0.0
        with:
          files: target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml
