name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      frontend_tests:
        description: 'Run TypeScript/Vitest tests'
        type: boolean
        default: false
      fast_java_tests:
        description: 'Run fast Java tests'
        type: boolean
        default: false
# Re-enable in the future
#      full_java_tests:
#        description: 'Run all Java tests'
#        type: boolean
#        default: false
# Re-enable when build is fixed
#      run_build:
#        description: 'Run build'
#        type: boolean
#        default: false
      java_vendor:
        description: 'Java vendor Maven toolchain'
        type: string
        default: 'temurin'
# Re-enable when full java tests are fixed
#      nightly_build:
#        description: 'Optional nightly build configuration'
#        type: string
#        default: ''

permissions:
  contents: read

env:
  RS_FILE_BASE: /tmp/${{ github.ref_name }}-filestore
  CI: "true"

jobs:
#  initialize:
#    runs-on: ubuntu-latest
#    outputs:
#      sanitized_dbname: ${{ steps.dbname.outputs.name }}
#    steps:
#      - name: Generate sanitized DB name
#        id: dbname
#        run: |
#          BRANCH_NAME="${GITHUB_REF_NAME}"
#          SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^A-Za-z0-9]/_/g' | cut -c1-63)
#          echo "name=$SANITIZED" >> $GITHUB_OUTPUT

  changed-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      java: ${{ steps.filter.outputs.java }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            frontend:
              - 'src/main/webapp/ui/**/*.{js,jsx,ts,tsx}'
              - 'src/main/webapp/ui/**/*.{css,json}'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'src/main/webapp/ui/webpack.config.mjs'
            java:
              - 'src/main/java/**'
              - 'src/test/java/**'
              - 'pom.xml'

  fast-junit-tests:
    runs-on: ubuntu-latest
    needs: changed-files
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        java-version: [17]
    if: |
      github.event_name == 'pull_request' ||
      inputs.fast_java_tests ||
      needs.changed-files.outputs.java == 'true'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: ${{ inputs.java_vendor || 'temurin' }}
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Setup filestore
        run: |
          rm -rf $RS_FILE_BASE
          mkdir -p $RS_FILE_BASE

      - name: Run fast tests
        run: |
          ./mvnw clean test -U -Dfast=true -DRS_FILE_BASE=${RS_FILE_BASE} \
            -Djava-version=${{ matrix.java-version }} \
            -Djava-vendor=${{ inputs.java_vendor || 'temurin' }}

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        if: |
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        with:
          comment_mode: off
          files: target/surefire-reports/*.xml

  frontend-checks:
    runs-on: ubuntu-latest
    needs: changed-files
    if: |
      github.event_name == 'pull_request' || 
      inputs.frontend_tests ||
      needs.changed-files.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: |
          pnpm exec tsc --version
          pnpm run tsc

  vitest-tests:
    runs-on: ubuntu-latest
    needs: changed-files
    permissions:
      contents: read
      checks: write
      pull-requests: write
    if: |
      github.event_name == 'pull_request' || 
      inputs.frontend_tests ||
      needs.changed-files.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest tests
        run: pnpm run test

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        if: |
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        with:
          check_name: Vitest Tests
          comment_mode: off
          files: src/main/webapp/ui/junit.xml

  playwright-tests:
    runs-on: ubuntu-latest
    needs: changed-files
    permissions:
      contents: read
      issues: write
      pull-requests: write
    strategy:
      matrix:
        browser: [ chromium, firefox, webkit ]
    if: |
      github.event_name == 'pull_request' || 
      inputs.frontend_tests ||
      needs.changed-files.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results-${{ matrix.browser }}.json
        run: |
          rm -rf src/main/webapp/ui/playwright/.cache
          pnpm run test-ct -- --project=${{ matrix.browser }} --workers=2 --reporter=html,json

      - name: Summarize Playwright report
        if: always()
        uses: daun/playwright-report-summary@v4
        with:
          report-file: src/main/webapp/ui/playwright-report/results-${{ matrix.browser }}.json
          report-tag: ${{ matrix.browser }}
          create-comment: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
          job-summary: true
          comment-title: Playwright component test results
          test-command: pnpm run test-ct -- --project=${{ matrix.browser }} --workers=2 --reporter=html,json

  # Bundle-size comparison: build the frontend on both the PR and the base
  # branch, then diff the two stats.json files and post the result as a PR
  # comment. Restricted to same-repo PRs because posting the comment needs a
  # writable GITHUB_TOKEN, which fork PRs do not receive. Each build produces
  # src/main/webapp/ui/dist/stats.json via the vite-bundle-analyzer plugin
  # (enabled by FRONTEND_BUILD_STATS, see pnpm run build:stats).
  bundle-size-pr:
    name: Bundle size (PR)
    runs-on: ubuntu-latest
    needs: changed-files
    permissions:
      contents: read
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.changed-files.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with bundle stats
        run: pnpm run build:stats

      - name: Upload PR bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats-pr
          path: src/main/webapp/ui/dist/stats.json
          if-no-files-found: error
          retention-days: 1

  bundle-size-base:
    name: Bundle size (base)
    runs-on: ubuntu-latest
    needs: changed-files
    permissions:
      contents: read
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.changed-files.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.base_ref }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with bundle stats
        run: pnpm run build:stats

      - name: Upload base bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats-base
          path: src/main/webapp/ui/dist/stats.json
          if-no-files-found: error
          retention-days: 1

  bundle-size-report:
    name: Bundle size report
    runs-on: ubuntu-latest
    needs: [bundle-size-pr, bundle-size-base]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download PR bundle stats
        uses: actions/download-artifact@v8.0.1
        with:
          name: bundle-stats-pr
          path: pr

      - name: Download base bundle stats
        uses: actions/download-artifact@v8.0.1
        with:
          name: bundle-stats-base
          path: base

      - name: Compare bundle size and comment
        uses: wojtekmaj/vite-compare-bundle-size@v1.2.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          current-stats-json-path: pr/stats.json
          base-stats-json-path: base/stats.json
          title: Frontend bundle size change
          # The bundle is hundreds of chunks; only list assets that actually
          # changed (added/removed/bigger/smaller) and omit the unchanged list.
          describe-assets: changed-only

