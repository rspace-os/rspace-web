name: e2e (reusable)

on:
  workflow_call:
    inputs:
      mode:
        description: "mock | real"
        required: true
        type: string
      java_vendor:
        description: "Java vendor Maven toolchain"
        type: string
        default: "temurin"

permissions:
  contents: read

env:
  CI: "true"
  RS_FILE_BASE: /tmp/e2e-filestore
  E2E_INTEGRATION_MODE: ${{ inputs.mode }}
  E2E_MOCK_PORT: "9099"
  RSPACE_BASE_URL: http://localhost:8080
  # Keep this in sync with matrix.shard below.
  E2E_SHARD_TOTAL: "3"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        java-version: [17]
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@v5.4.0
        with:
          distribution: ${{ inputs.java_vendor }}
          java-version: ${{ matrix.java-version }}
          cache: maven
      - name: Set up Node + pnpm
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
      - run: corepack enable
      - name: Package WAR (frontend + backend)
        run: ./mvnw clean package -DgenerateReactDist -DskipTests -Djava-version=${{ matrix.java-version }} -Djava-vendor=${{ inputs.java_vendor }} -Dtimestamp=${{ github.run_id }}
      - name: Upload WAR
        uses: actions/upload-artifact@v7.0.1
        with:
          name: rspace-war
          path: target/*.war
          retention-days: 1

  e2e:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java-version: [17]
        project: [chromium, firefox, webkit, mobile]
        shard: [1, 2, 3]
        # API specs are a single file; run them once, unsharded.
        include:
          - java-version: 17
            project: api
            shard: 1
    services:
      db:
        image: mariadb:12.3
        env:
          MARIADB_ROOT_PASSWORD: rspacedbpwd
          MARIADB_DATABASE: rspace
          MARIADB_USER: rspacedbuser
          MARIADB_PASSWORD: rspacedbpwd
        ports:
          - 3306:3306
        options: >-
          --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=2g
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=40
          --health-start-period=30s
      # Chemistry-gated integrations require this in both modes.
      chemistry:
        image: rspaceops/oss-chemistry:latest
        ports:
          - 8090:8090

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v5.4.0
        with:
          distribution: ${{ inputs.java_vendor }}
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Set up Node + pnpm
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
      - run: corepack enable

      - name: Resolve project matrix
        run: |
          case "${{ matrix.project }}" in
            mobile) echo "E2E_PW_BROWSER=chromium" >> "$GITHUB_ENV"; echo "E2E_SHARD_OF=${E2E_SHARD_TOTAL}" >> "$GITHUB_ENV" ;;
            api)    echo "E2E_PW_BROWSER=" >> "$GITHUB_ENV";          echo "E2E_SHARD_OF=1" >> "$GITHUB_ENV" ;;
            *)      echo "E2E_PW_BROWSER=${{ matrix.project }}" >> "$GITHUB_ENV"; echo "E2E_SHARD_OF=${E2E_SHARD_TOTAL}" >> "$GITHUB_ENV" ;;
          esac

      - name: Download prebuilt WAR
        uses: actions/download-artifact@v8.0.1
        with:
          name: rspace-war
          path: target

      - name: Configure MariaDB
        run: |
          mysql -h127.0.0.1 -uroot -prspacedbpwd <<'SQL'
          SET GLOBAL character_set_server = 'utf8mb4';
          SET GLOBAL collation_server = 'utf8mb4_unicode_ci';
          SET GLOBAL sql_mode = 'STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION';
          GRANT CREATE, DROP ON *.* TO 'rspacedbuser'@'%';
          FLUSH PRIVILEGES;
          SQL

      - name: Setup filestore
        run: |
          rm -rf "$RS_FILE_BASE"
          mkdir -p "$RS_FILE_BASE"

      # Start the app in the background first so its ~2.5 min boot overlaps the
      # pnpm/Playwright install below instead of stacking after it.
      - name: Start RSpace (prebuilt WAR)
        env:
          PYRAT_SERVER_TOKEN: ${{ inputs.mode == 'real' && secrets.PYRAT_SERVER_TOKEN || '' }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.mode }}" = "mock" ]; then
            INTEGRATION_ARGS=(
              "-Dpubchem.base.url=http://localhost:$E2E_MOCK_PORT"
              "-Dfieldmark.api.url=http://localhost:$E2E_MOCK_PORT"
              "-Dzenodo.url=http://localhost:$E2E_MOCK_PORT"
              "-Dgalaxy.server.config=[{\"alias\":\"mock\",\"url\":\"http://localhost:$E2E_MOCK_PORT\"}]"
              "-Dpyrat.server.config={\"mock\":{\"url\":\"http://localhost:$E2E_MOCK_PORT\",\"token\":\"mock-server-token\"}}"
              "-Domero.api.url=http://localhost:$E2E_MOCK_PORT"
            )
          else
            INTEGRATION_ARGS=(
              "-Dpyrat.server.config={\"default-server\":{\"url\":\"https://demo.pyrat.cloud/rspace511/api/v3/\",\"token\":\"$PYRAT_SERVER_TOKEN\"}}"
            )
          fi
          nohup ./mvnw jetty:run-war \
            -DskipTests=true -Dmaven.war.skip=true \
            -Dtimestamp=${{ github.run_id }} \
            -Djava-version=${{ matrix.java-version }} -Djava-vendor=${{ inputs.java_vendor }} \
            -Denvironment=drop-recreate-db \
            -Dspring.profiles.active=run \
            -DreactDevMode=false \
            -Dchemistry.provider=indigo \
            -Dchemistry.service.url=http://localhost:8090 \
            -Djdbc.url=jdbc:mysql://localhost:3306/rspace \
            -Djdbc.db.maven=rspace \
            -DRS_FILE_BASE="$RS_FILE_BASE" \
            -DRS.devlogLevel=INFO \
            "${INTEGRATION_ARGS[@]}" \
            > /tmp/jetty.log 2>&1 &

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        if: env.E2E_PW_BROWSER != ''
        run: pnpm exec playwright install --with-deps ${{ env.E2E_PW_BROWSER }}

      - name: Wait for RSpace readiness
        run: |
          set -euo pipefail
          for i in $(seq 1 180); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/login || true)" = "200" ]; then
              echo "Ready after ~$((i*5))s"; exit 0
            fi
            sleep 5
          done
          echo "::error::RSpace did not become ready in time"; tail -100 /tmp/jetty.log; exit 1

      - name: Run e2e (${{ inputs.mode }} / ${{ matrix.project }} / shard ${{ matrix.shard }})
        env:
          RSPACE_SYSADMIN_PASSWORD: "sysWisc23!"
          E2E_BROWSER: ${{ matrix.project }}
          FIELDMARK_API_KEY: ${{ inputs.mode == 'real' && secrets.FIELDMARK_API_KEY || '' }}
          ZENODO_API_KEY: ${{ inputs.mode == 'real' && secrets.ZENODO_API_KEY || '' }}
          GALAXY_EU_APIKEY: ${{ inputs.mode == 'real' && secrets.GALAXY_EU_APIKEY || '' }}
          DATAVERSE_API_TOKEN: ${{ inputs.mode == 'real' && secrets.DATAVERSE_API_TOKEN || '' }}
          DATAVERSE_SERVER_URL: ${{ inputs.mode == 'real' && secrets.DATAVERSE_SERVER_URL || '' }}
          DATAVERSE_NAME: ${{ inputs.mode == 'real' && secrets.DATAVERSE_NAME || '' }}
          DSW_API_KEY: ${{ inputs.mode == 'real' && secrets.DSW_API_KEY || '' }}
          DSW_SERVER_URL: ${{ inputs.mode == 'real' && secrets.DSW_SERVER_URL || '' }}
          PYRAT_API_KEY: ${{ inputs.mode == 'real' && secrets.PYRAT_API_KEY || '' }}
          OMERO_USERNAME: ${{ inputs.mode == 'real' && secrets.OMERO_USERNAME || '' }}
          OMERO_PASSWORD: ${{ inputs.mode == 'real' && secrets.OMERO_PASSWORD || '' }}
          IGSN_ACCOUNT_ID: ${{ inputs.mode == 'real' && secrets.IGSN_ACCOUNT_ID || '' }}
          IGSN_PASSWORD: ${{ inputs.mode == 'real' && secrets.IGSN_PASSWORD || '' }}
          IGSN_REPO_PREFIX: ${{ inputs.mode == 'real' && secrets.IGSN_REPO_PREFIX || '' }}
        run: pnpm run test-e2e --shard=${{ matrix.shard }}/${{ env.E2E_SHARD_OF }}

      - name: Dump server log on failure
        if: failure()
        run: |
          echo "=== Jetty stdout (last 100 lines) ===" && tail -100 /tmp/jetty.log || true
          echo "=== RSpace error.log (last 200 lines) ===" && tail -200 error.log || true

      - name: Upload Jetty log on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: jetty-log-${{ inputs.mode }}-${{ matrix.project }}-${{ matrix.shard }}
          path: |
            /tmp/jetty.log
            error.log
            httpRequests.log
          retention-days: 3

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: e2e-report-${{ inputs.mode }}-${{ matrix.project }}-${{ matrix.shard }}
          path: |
            src/main/webapp/ui/playwright-report
            src/main/webapp/ui/test-results
            src/main/webapp/ui/e2e-junit.xml
          retention-days: 14
